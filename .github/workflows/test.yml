name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Playwright base URL (leave empty for local build)'
        required: false
        default: ''

env:
  NODE_VERSION: '20'

jobs:
  # ── Unit & Integration Tests ────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'test-key' }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY || 'test-secret' }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY || 'test-public' }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY || 'test-private' }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL || 'mailto:test@example.com' }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL || 'https://test.upstash.io' }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN || 'test-token' }}
          PUSH_SEND_SECRET: ${{ secrets.PUSH_SEND_SECRET || 'test-secret' }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── End-to-End Tests (Local Build) ──────────────────────────────────────────
  e2e-tests-local:
    name: E2E Tests (Local Build)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Build site
        run: npm run build
        env:
          PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY || 'test-public' }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.PUBLIC_TURNSTILE_SITE_KEY || 'test-site' }}
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID || 'G-TEST123' }}

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-local
          path: playwright-report/
          retention-days: 7

  # ── End-to-End Tests (Deployed Preview) ───────────────────────────────────
  e2e-tests-preview:
    name: E2E Tests (Vercel Preview)
    runs-on: ubuntu-latest
    needs: unit-tests
    # Only run on PRs or when base_url is explicitly provided
    if: github.event_name == 'pull_request' || inputs.base_url != ''
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Determine preview URL
        id: preview
        run: |
          if [ -n "${{ inputs.base_url }}" ]; then
            echo "url=${{ inputs.base_url }}" >> $GITHUB_OUTPUT
          else
            # For PRs, you can integrate with Vercel's deployment action
            # See: https://github.com/vercel/vercel-action
            echo "url=https://example.com" >> $GITHUB_OUTPUT
          fi

      - name: Run E2E tests against preview
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.url }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-preview
          path: playwright-report/
          retention-days: 7

  # ── End-to-End Tests (Production Smoke) ─────────────────────────────────────
  e2e-tests-production:
    name: E2E Smoke Tests (Production)
    runs-on: ubuntu-latest
    # Run only on main branch pushes, not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run smoke tests against production
        run: npx playwright test tests/e2e/broken-links.spec.ts tests/e2e/navigation.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: https://example.com

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-production
          path: playwright-report/
          retention-days: 7
